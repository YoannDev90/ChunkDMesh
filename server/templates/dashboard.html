<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChunkDMesh - Admin Dashboard</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 20px; }
        h1 { color: #4ade80; margin-bottom: 20px; font-size: 1.5rem; }
        .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px 24px; min-width: 140px; }
        .stat-card .label { font-size: 0.75rem; color: #888; text-transform: uppercase; }
        .stat-card .value { font-size: 1.5rem; font-weight: bold; margin-top: 4px; }
        .stat-card .value.green { color: #4ade80; }
        .stat-card .value.blue { color: #60a5fa; }
        .stat-card .value.yellow { color: #facc15; }
        .stat-card .value.red { color: #f87171; }
        .heatmap-container { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px; overflow: auto; }
        .heatmap { display: grid; gap: 2px; }
        .cell { width: 12px; height: 12px; border-radius: 2px; }
        .cell.pending { background: #374151; }
        .cell.assigned { background: #facc15; }
        .cell.working { background: #60a5fa; }
        .cell.completed { background: #4ade80; }
        .cell.validated { background: #22c55e; }
        .cell.hash_error { background: #ef4444; }
        .legend { display: flex; gap: 16px; margin-top: 12px; font-size: 0.75rem; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
        .actions { margin-top: 24px; display: flex; gap: 12px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.875rem; font-weight: 500; }
        .btn-green { background: #4ade80; color: #000; }
        .btn-blue { background: #60a5fa; color: #000; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-msg { margin-top: 12px; font-size: 0.875rem; color: #888; }
    </style>
</head>
<body>
    <h1>ChunkDMesh Dashboard</h1>

    <div class="stats" id="stats" hx-get="/admin/progress" hx-trigger="load, every 5s" hx-swap="innerHTML">
        <div class="stat-card"><div class="label">Loading...</div><div class="value">-</div></div>
    </div>

    <div class="heatmap-container">
        <div class="heatmap" id="heatmap" hx-get="/admin/heatmap/html" hx-trigger="load, every 5s" hx-swap="innerHTML">
            Loading heatmap...
        </div>
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#374151"></div> Pending</div>
            <div class="legend-item"><div class="legend-dot" style="background:#facc15"></div> Assigned</div>
            <div class="legend-item"><div class="legend-dot" style="background:#60a5fa"></div> Working</div>
            <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div> Completed</div>
            <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Validated</div>
            <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Error</div>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-green" hx-post="/admin/assemble" hx-swap="none" hx-on::after-request="alert('Assembly started')">Assemble World</button>
        <button class="btn btn-blue" hx-post="/admin/export" hx-swap="none" hx-on::after-request="alert('Export started')">Export Archive</button>
        <a href="/admin/map" class="btn" style="background:#6366f1;color:#fff;text-decoration:none;">Open Map</a>
    </div>
    <div id="status-msg" class="status-msg"></div>
</body>
</html>
