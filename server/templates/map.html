<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChunkDMesh - Live Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; background: #1a1a1a; }
        #map { width: 100vw; height: 100vh; }
        .leaflet-container { background: #222 !important; }

        .coords-display {
            background: rgba(0,0,0,0.7); color: #fff; padding: 8px 12px;
            border-radius: 5px; font-size: 12px; font-family: monospace;
        }
        .coords-display a { color: #4ade80; }
        .coords-display a:hover { text-decoration: none; }

        .hover-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: rgba(30,30,30,0.95); border: 2px solid #4CAF50;
            border-radius: 10px; width: 90%; max-width: 380px; z-index: 2000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none;
        }
        .hover-overlay.visible { display: block; }
        .hover-header {
            background: linear-gradient(135deg,#2d5016,#4CAF50); color: #fff;
            padding: 12px 16px; border-radius: 8px 8px 0 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .hover-header h3 { font-size: 15px; }
        .close-btn { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .close-btn:hover { background: rgba(255,255,255,0.2); }
        .hover-body { padding: 16px; color: #fff; }
        .hover-section { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .hover-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .hover-section label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .hover-value { font-family: monospace; font-size: 13px; color: #4ade80; word-break: break-all; }

        #loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 2500; display: none;
        }
        #loading.visible { display: block; }
        .spinner {
            border: 3px solid rgba(76,175,80,0.2); border-top: 3px solid #4CAF50;
            border-radius: 50%; width: 36px; height: 36px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .legend {
            background: rgba(0,0,0,0.75); border-radius: 6px; padding: 8px 12px;
            color: #ccc; font-size: 11px; line-height: 1.6;
        }
        .legend strong { color: #4ade80; }

        @media (max-width: 600px) {
            .hover-overlay { width: 95%; max-width: 95vw; }
            .coords-display { font-size: 10px; padding: 5px 8px; }
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="hover-overlay" class="hover-overlay">
        <div class="hover-header">
            <h3>Block Info</h3>
            <button class="close-btn" id="close-hover">&times;</button>
        </div>
        <div class="hover-body">
            <div class="hover-section">
                <label>Coordinates</label>
                <div class="hover-value" id="coord-value">--</div>
            </div>
            <div class="hover-section">
                <label>Block</label>
                <div class="hover-value" id="block-value">--</div>
            </div>
            <div class="hover-section">
                <label>Biome</label>
                <div class="hover-value" id="biome-value">--</div>
            </div>
        </div>
    </div>

    <div id="loading" class="visible">
        <div class="spinner"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    // === Configuration ===
    const CHUNK_SIZE = 16;
    const TILE_SIZE = 256;
    const API_BASE = '/admin/map';

    // === Map Init — custom CRS: 256px tile = 16 blocks at max zoom ===
    const MinecraftCRS = L.extend({}, L.CRS.Simple, {
        scale: function(zoom) { return Math.pow(2, zoom - 1); },
        transformation: new L.Transformation(1, 0, 1, 0)
    });
    const map = L.map('map', {
        crs: MinecraftCRS,
        minZoom: 0,
        maxZoom: 5,
        attributionControl: false,
        zoomControl: false,
    });

    L.control.zoom({ position: 'topright' }).addTo(map);

    // Custom tile layer: each tile = 1 chunk at zoom 5
    L.tileLayer(`${API_BASE}/tile/{z}/{x}/{y}.png`, {
        minZoom: 0,
        maxZoom: 5,
        tileSize: 256,
        noWrap: true,
        maxNativeZoom: 5,
    }).addTo(map);

    // === Coords Display ===
    const coordDiv = L.control({ position: 'topright' });
    coordDiv.onAdd = function() {
        const div = L.DomUtil.create('div', 'coords-display');
        div.id = 'coords-display';
        div.innerHTML = 'X: -- | Z: --';
        return div;
    };
    coordDiv.addTo(map);

    map.on('mousemove', function(e) {
        // CRS.Simple: lat = Z (vertical/south), lng = X (horizontal/east)
        const wz = Math.floor(e.latlng.lat);
        const wx = Math.floor(e.latlng.lng);
        document.getElementById('coords-display').innerHTML =
            `X: <strong>${wx}</strong> | Z: <strong>${wz}</strong>`;
    });

    // === Hover Overlay ===
    const overlay = document.getElementById('hover-overlay');
    const loading = document.getElementById('loading');

    document.getElementById('close-hover').onclick = () => {
        overlay.classList.remove('visible');
    };
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') overlay.classList.remove('visible');
    });

    map.on('click', async function(e) {
        // CRS.Simple: lat = Z (vertical/south), lng = X (horizontal/east)
        const wz = Math.floor(e.latlng.lat);
        const wx = Math.floor(e.latlng.lng);
        const cx = Math.floor(wx / CHUNK_SIZE);
        const cz = Math.floor(wz / CHUNK_SIZE);
        const lx = ((wx % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
        const lz = ((wz % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;

        loading.classList.add('visible');

        try {
            const resp = await fetch(
                `${API_BASE}/hover/${cx}/${cz}/${lx}/${lz}`
            );
            const data = await resp.json();

            if (data.error) {
                document.getElementById('coord-value').textContent = 'Error';
                document.getElementById('block-value').textContent = data.error;
                document.getElementById('biome-value').textContent = '-';
            } else {
                const c = data.coords;
                document.getElementById('coord-value').textContent =
                    `X: ${c.world_x} | Y: ${c.y} | Z: ${c.world_z}`;
                document.getElementById('block-value').textContent =
                    `${data.block.name} (h=${data.block.height})`;
                document.getElementById('biome-value').textContent =
                    `${data.biome.name}`;
            }
            overlay.classList.add('visible');
        } catch (err) {
            document.getElementById('coord-value').textContent = 'Fetch error';
            document.getElementById('block-value').textContent = err.message;
            document.getElementById('biome-value').textContent = '-';
            overlay.classList.add('visible');
        } finally {
            loading.classList.remove('visible');
        }
    });

    // === Legend ===
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function() {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = `
            <strong>ChunkDMesh Map</strong><br>
            Click any tile for block info<br>
            Zoom: 0-5 (5 = 1 chunk)
        `;
        return div;
    };
    legend.addTo(map);

    // Set initial view centered on 0,0
    map.setView([0, 0], 3);

    // Hide initial loading after tiles start loading
    map.on('tileload', function() {
        loading.classList.remove('visible');
    });
    setTimeout(() => loading.classList.remove('visible'), 3000);

    // === Region overlay (task grid) — disabled by default ===
    let regionOverlay = L.layerGroup().addTo(map);
    let regionOverlayVisible = false;

    async function loadRegionOverlay() {
        if (!regionOverlayVisible) return;
        try {
            regionOverlay.clearLayers();
            const resp = await fetch(`${API_BASE}/regions`);
            const data = await resp.json();
            for (const r of data.regions || []) {
                if (r.region_x === undefined || r.region_z === undefined) continue;
                const z1 = r.region_z * 32 * CHUNK_SIZE;
                const x1 = r.region_x * 32 * CHUNK_SIZE;
                const z2 = z1 + 32 * CHUNK_SIZE;
                const x2 = x1 + 32 * CHUNK_SIZE;
                const color = r.status === 'validated' ? '#4ade80' :
                              r.status === 'completed' ? '#60a5fa' :
                              r.status === 'working'   ? '#facc15' :
                              r.status === 'assigned'  ? '#fb923c' :
                                                        '#555';
                L.rectangle([[z1, x1], [z2, x2]], {
                    color, weight: 1, fillOpacity: 0.05, interactive: false,
                }).addTo(regionOverlay);
            }
        } catch (e) {}
    }

    // Toggle button for region overlay
    const gridBtn = L.control({ position: 'bottomleft' });
    gridBtn.onAdd = function() {
        const btn = L.DomUtil.create('button', '');
        btn.innerHTML = '▦ Grid';
        btn.style.cssText = 'background:rgba(0,0,0,0.7);color:#aaa;border:1px solid #555;border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer;';
        btn.onclick = function() {
            regionOverlayVisible = !regionOverlayVisible;
            btn.style.color = regionOverlayVisible ? '#4ade80' : '#aaa';
            if (regionOverlayVisible) loadRegionOverlay();
            else regionOverlay.clearLayers();
        };
        return btn;
    };
    gridBtn.addTo(map);

    setInterval(loadRegionOverlay, 10000);
    </script>
</body>
</html>
