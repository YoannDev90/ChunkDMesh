<div class="stat-card"><div class="label">Total Files</div><div class="value blue">{{ total_files }}</div></div>
<div class="stat-card"><div class="label">Size (MB)</div><div class="value blue">{{ total_size_mb }}</div></div>
<div class="stat-card"><div class="label">Assigned</div><div class="value yellow">{{ assigned }}</div></div>
<div class="stat-card"><div class="label">Working</div><div class="value blue">{{ working }}</div></div>
<div class="stat-card"><div class="label">Completed</div><div class="value green">{{ completed }}</div></div>
<div class="stat-card"><div class="label">Validated</div><div class="value green">{{ validated }}</div></div>
<div class="stat-card"><div class="label">Errors</div><div class="value red">{{ errors }}</div></div>
